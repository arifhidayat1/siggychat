<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Siggy AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:420px;
height:600px;
background:#111827;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#1f2937;
padding:15px;
font-weight:bold;
text-align:center;
font-size:18px;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
margin-bottom:12px;
}

.user{
text-align:right;
color:#60a5fa;
}

.bot{
text-align:left;
color:#34d399;
}

.input-area{
display:flex;
padding:10px;
background:#1f2937;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
margin-left:8px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
Siggy AI — Ritual Community Analyzer
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Masukkan username X atau pertanyaan..." />
<button onclick="sendMessage()">Kirim</button>
</div>

</div>

<script>

const WEBHOOK_URL = "https://asceno.app.n8n.cloud/webhook/siggy chat"

function addMessage(text,cls){

const chat=document.getElementById("chat")

const div=document.createElement("div")
div.className="message "+cls
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

async function sendMessage(){

const input=document.getElementById("msg")
const message=input.value

if(!message)return

addMessage("You: "+message,"user")

input.value=""

try{

const res=await fetch(WEBHOOK_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chatInput:message,
sessionId:"siggy-web"
})
})

const data=await res.json()

addMessage("Siggy: "+JSON.stringify(data),"bot")

}catch(e){

addMessage("Siggy: Error connecting to AI","bot")

}

}

</script>

</body>
</html>
