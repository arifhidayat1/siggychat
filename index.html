<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy AI</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
height:620px;
background:#1e293b;
border-radius:16px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.header{
background:#020617;
padding:15px;
text-align:center;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
margin-bottom:12px;
padding:10px 14px;
border-radius:10px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#020617;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

button{
margin-left:8px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>


<body>

<div class="container">

<div class="header">
🐈‍⬛ Siggy AI — Ritual Community Assistant
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="message" placeholder="Ask Siggy..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>


<script>

const WEBHOOK_URL = https://asceno.app.n8n.cloud/webhook/siggy-chat


function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="msg "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}



async function sendMessage(){

let input=document.getElementById("message")

let message=input.value

if(!message)return

addMessage(message,"user")

input.value=""



try{

let res=await fetch(WEBHOOK_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

let data=await res.json()

let reply=data.reply || data.output || JSON.stringify(data)

addMessage(reply,"bot")

}

catch(error){

addMessage("Siggy tidak bisa dihubungi 😿","bot")

console.error(error)

}

}

</script>

</body>
</html>
